services:
  - type: web
    name: volleyball-ai-backend
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: CORS_ORIGINS
        sync: false
      - key: GCS_CREDENTIALS_JSON
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.6"
